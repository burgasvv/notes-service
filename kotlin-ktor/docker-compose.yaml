
services:

  kotlin-ktor-postgres:
    container_name: kotlin_ktor_postgres
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5010:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kotlin_ktor_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kotlin-ktor-redis:
    container_name: kotlin_ktor_redis
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6010:6379"
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  postgres-data:
  redis-data: