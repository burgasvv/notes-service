
services:

  kotlin-spring-postgres:
    container_name: kotlin_spring_postgres
    image: postgres:latest
    restart: unless-stopped
    ports:
      - "5000:5432"
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kotlin_spring_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  kotlin-spring-redis:
    container_name: kotlin_spring_redis
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6000:6379"
    volumes:
      - redis-data:/var/lib/redis/data

volumes:
  postgres-data:
  redis-data: